<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Snake - Prashant</title>
    <style>
        body {
            margin: 0;
            background: #0a0a0c;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Roboto, sans-serif;
            color: white;
        }
        /* Intro/Start Overlay */
        #overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(10, 10, 12, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: opacity 0.5s ease;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 5px;
            color: #00ff9d;
            text-shadow: 0 0 20px rgba(0, 255, 157, 0.6);
            letter-spacing: 2px;
        }
        .credits {
            font-size: 1rem;
            color: #888;
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 4px;
        }
        #startBtn {
            padding: 15px 40px;
            font-size: 1.2rem;
            background: transparent;
            color: #00ff9d;
            border: 2px solid #00ff9d;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 255, 157, 0.3);
            transition: all 0.3s;
        }
        #startBtn:active {
            background: #00ff9d;
            color: #0a0a0c;
        }
        canvas {
            background: #121214;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(0, 255, 157, 0.1);
            touch-action: none;
            display: none; /* Hidden until start */
        }
        .score-board {
            display: none;
            font-size: 24px;
            margin-bottom: 10px;
            font-weight: bold;
            color: #00ff9d;
            text-shadow: 0 0 10px rgba(0, 255, 157, 0.5);
        }
    </style>
</head>
<body>

    <div id="overlay">
        <h1>NEON SNAKE</h1>
        <div class="credits">Made by Prashant</div>
        <button id="startBtn">START GAME</button>
    </div>

    <div class="score-board" id="scoreBoard">SCORE: <span id="scoreVal">0</span></div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("scoreVal");
        const overlay = document.getElementById("overlay");
        const scoreBoard = document.getElementById("scoreBoard");
        const startBtn = document.getElementById("startBtn");

        const size = Math.min(window.innerWidth * 0.9, 400);
        canvas.width = size;
        canvas.height = size;

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;
        let score = 0, dx = 0, dy = 0, gameSpeed = 110;
        let snake = [{x: 10, y: 10}];
        let food = {x: 5, y: 5};
        let gameRunning = false;

        startBtn.addEventListener('click', () => {
            overlay.style.opacity = '0';
            setTimeout(() => {
                overlay.style.display = 'none';
                canvas.style.display = 'block';
                scoreBoard.style.display = 'block';
                gameRunning = true;
                main();
            }, 500);
        });

        function main() {
            if (!gameRunning) return;
            setTimeout(function onTick() {
                clearCanvas();
                drawFood();
                advanceSnake();
                drawSnake();
                main();
            }, gameSpeed);
        }

        function clearCanvas() {
            ctx.fillStyle = "#121214";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = "#1a1a1c";
            for(let i=0; i<canvas.width; i+=gridSize) {
                ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(canvas.width,i); ctx.stroke();
            }
        }

        function drawSnake() {
            snake.forEach((part, index) => {
                const isHead = index === 0;
                ctx.fillStyle = isHead ? "#00ff9d" : "#008a55";
                ctx.shadowBlur = isHead ? 15 : 0;
                ctx.shadowColor = "#00ff9d";
                ctx.beginPath();
                ctx.roundRect(part.x * gridSize + 2, part.y * gridSize + 2, gridSize - 4, gridSize - 4, 5);
                ctx.fill();
            });
            ctx.shadowBlur = 0;
        }

        function advanceSnake() {
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            snake.unshift(head);
            if (snake[0].x === food.x && snake[0].y === food.y) {
                score += 10;
                scoreElement.innerHTML = score;
                createFood();
            } else {
                if(dx !== 0 || dy !== 0) snake.pop();
            }
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount || checkCollision()) {
                location.reload(); // Restart on fail
            }
        }

        function checkCollision() {
            for (let i = 4; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) return true;
            }
            return false;
        }

        function drawFood() {
            ctx.fillStyle = "#ff0055";
            ctx.shadowBlur = 10;
            ctx.shadowColor = "#ff0055";
            ctx.beginPath();
            ctx.arc(food.x * gridSize + gridSize/2, food.y * gridSize + gridSize/2, gridSize/3, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        function createFood() {
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);
        }

        // --- Touch Controls ---
        let touchStartX = 0, touchStartY = 0;
        canvas.addEventListener('touchstart', e => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, {passive: false});

        canvas.addEventListener('touchmove', e => {
            if (!touchStartX || !touchStartY) return;
            let touchEndX = e.touches[0].clientX;
            let touchEndY = e.touches[0].clientY;
            let diffX = touchStartX - touchEndX, diffY = touchStartY - touchEndY;
            if (Math.abs(diffX) > Math.abs(diffY)) {
                if (diffX > 0 && dx === 0) { dx = -1; dy = 0; }
                else if (diffX < 0 && dx === 0) { dx = 1; dy = 0; }
            } else {
                if (diffY > 0 && dy === 0) { dx = 0; dy = -1; }
                else if (diffY < 0 && dy === 0) { dx = 0; dy = 1; }
            }
            touchStartX = 0; touchStartY = 0;
            e.preventDefault();
        }, {passive: false});
    </script>
</body>
</html>
