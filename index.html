<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Snake Mobile</title>
    <style>
        body {
            margin: 0;
            background: #0a0a0c;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }
        canvas {
            background: #121214;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(0, 255, 157, 0.2);
            touch-action: none;
        }
        .score-board {
            font-size: 24px;
            margin-bottom: 10px;
            font-weight: bold;
            color: #00ff9d;
            text-shadow: 0 0 10px rgba(0, 255, 157, 0.5);
        }
        .controls-hint {
            margin-top: 15px;
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>

    <div class="score-board">SCORE: <span id="scoreVal">0</span></div>
    <canvas id="gameCanvas"></canvas>
    <div class="controls-hint">Swipe to Move</div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("scoreVal");

        // Set canvas size based on mobile screen
        const size = Math.min(window.innerWidth * 0.9, 400);
        canvas.width = size;
        canvas.height = size;

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let score = 0;
        let dx = 0;
        let dy = 0;
        let snake = [{x: 10, y: 10}];
        let food = {x: 5, y: 5};

        // Game Speed
        let gameSpeed = 100;

        function main() {
            setTimeout(function onTick() {
                clearCanvas();
                drawFood();
                advanceSnake();
                drawSnake();
                main();
            }, gameSpeed);
        }

        function clearCanvas() {
            ctx.fillStyle = "#121214";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw faint grid
            ctx.strokeStyle = "#1a1a1c";
            for(let i=0; i<canvas.width; i+=gridSize) {
                ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(canvas.width,i); ctx.stroke();
            }
        }

        function drawSnake() {
            snake.forEach((part, index) => {
                const isHead = index === 0;
                ctx.fillStyle = isHead ? "#00ff9d" : "#008a55";
                ctx.shadowBlur = isHead ? 15 : 0;
                ctx.shadowColor = "#00ff9d";
                
                // Rounded snake segments
                ctx.beginPath();
                ctx.roundRect(part.x * gridSize + 2, part.y * gridSize + 2, gridSize - 4, gridSize - 4, 5);
                ctx.fill();
            });
            ctx.shadowBlur = 0; // Reset blur for other elements
        }

        function advanceSnake() {
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            snake.unshift(head);

            if (snake[0].x === food.x && snake[0].y === food.y) {
                score += 10;
                scoreElement.innerHTML = score;
                createFood();
            } else {
                if(dx !== 0 || dy !== 0) snake.pop();
            }

            // Wall Collision & Self Collision
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount || checkCollision()) {
                resetGame();
            }
        }

        function checkCollision() {
            for (let i = 4; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) return true;
            }
            return false;
        }

        function drawFood() {
            ctx.fillStyle = "#ff0055";
            ctx.shadowBlur = 10;
            ctx.shadowColor = "#ff0055";
            ctx.beginPath();
            ctx.arc(food.x * gridSize + gridSize/2, food.y * gridSize + gridSize/2, gridSize/3, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        function createFood() {
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);
        }

        function resetGame() {
            snake = [{x: 10, y: 10}];
            score = 0;
            scoreElement.innerHTML = score;
            dx = 0; dy = 0;
            createFood();
        }

        // --- Touch Controls ---
        let touchStartX = 0;
        let touchStartY = 0;

        canvas.addEventListener('touchstart', e => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, false);

        canvas.addEventListener('touchmove', e => {
            if (!touchStartX || !touchStartY) return;

            let touchEndX = e.touches[0].clientX;
            let touchEndY = e.touches[0].clientY;

            let diffX = touchStartX - touchEndX;
            let diffY = touchStartY - touchEndY;

            if (Math.abs(diffX) > Math.abs(diffY)) {
                if (diffX > 0 && dx === 0) { dx = -1; dy = 0; } // Left
                else if (diffX < 0 && dx === 0) { dx = 1; dy = 0; } // Right
            } else {
                if (diffY > 0 && dy === 0) { dx = 0; dy = -1; } // Up
                else if (diffY < 0 && dy === 0) { dx = 0; dy = 1; } // Down
            }
            
            touchStartX = 0; touchStartY = 0;
            e.preventDefault();
        }, false);

        main();
    </script>
</body>
</html>
