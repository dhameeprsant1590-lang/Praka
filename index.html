<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prashant Tube Infinity</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { 
            --bg-black: #0f0f0f; --card-bg: #1e1e1e; --text-main: #ffffff; 
            --text-gray: #aaaaaa; --accent: #ef4444; --sidebar-width: 240px;
        }
        .light-theme {
            --bg-black: #ffffff; --card-bg: #f1f1f1; --text-main: #0f0f0f; 
            --text-gray: #606060; --accent: #cc0000;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; transition: background 0.2s, color 0.2s; }
        body { background-color: var(--bg-black); color: var(--text-main); overflow-x: hidden; }

        /* --- HEADER --- */
        header {
            position: fixed; top: 0; width: 100%; height: 65px; background: var(--bg-black);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; z-index: 1000; border-bottom: 1px solid #33333355; backdrop-filter: blur(10px);
        }
        .brand-name {
            font-size: 20px; font-weight: 900; background: linear-gradient(to right, #ef4444, #3b82f6, #ef4444);
            background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite; cursor: pointer;
        }
        @keyframes shine { to { background-position: 200% center; } }
        .search-box { background: #88888815; border: 1px solid #33333355; padding: 8px 20px; border-radius: 40px; color: var(--text-main); width: 400px; outline: none; }

        /* --- SIDEBAR --- */
        .sidebar { position: fixed; top: 65px; width: var(--sidebar-width); height: 100vh; padding: 10px; background: var(--bg-black); z-index: 900; transition: 0.3s; }
        .sidebar.collapsed { transform: translateX(-240px); }
        .side-item { display: flex; align-items: center; gap: 20px; padding: 12px; border-radius: 10px; cursor: pointer; }
        .side-item:hover { background: #88888822; }

        /* --- MAIN --- */
        main { margin-top: 85px; margin-left: var(--sidebar-width); padding: 20px; transition: 0.3s; }
        main.expanded { margin-left: 0; }
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
        
        .video-card { cursor: pointer; position: relative; }
        .thumb-wrapper { position: relative; width: 100%; aspect-ratio: 16/9; border-radius: 12px; overflow: hidden; background: #000; }
        .thumb-wrapper img { width: 100%; height: 100%; object-fit: cover; transition: 0.4s; }
        .video-card:hover img { transform: scale(1.05); }
        
        .action-btns { display: flex; gap: 10px; margin-top: 10px; }
        .sub-btn { background: #ef4444; color: white; border: none; padding: 6px 15px; border-radius: 20px; font-weight: bold; cursor: pointer; }
        .sub-btn.active { background: #333; color: #aaa; }
        .like-btn { background: #88888822; border: none; padding: 6px 12px; border-radius: 20px; color: var(--text-main); cursor: pointer; }
        .like-btn.liked { color: #3b82f6; }

        /* --- MODALS --- */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 2000; }
        .modal-content-wide { width: 90%; max-width: 1000px; background: var(--card-bg); border-radius: 15px; overflow: hidden; display: flex; flex-direction: column; }
        .video-container { width: 100%; aspect-ratio: 16/9; }
        
        /* --- COMMENTS --- */
        .comments-section { padding: 20px; max-height: 350px; overflow-y: auto; background: var(--bg-black); }
        .comment-input { display: flex; gap: 10px; margin-bottom: 20px; }
        .comment-input input { flex: 1; padding: 10px; border-radius: 5px; border: 1px solid #444; background: #121212; color: white; }

        .login-card, .upload-card { background: var(--card-bg); padding: 30px; border-radius: 15px; width: 350px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #444; background: transparent; color: inherit; }
        
        #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 12px 25px; border-radius: 50px; display: none; z-index: 3000; }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <span style="cursor:pointer; font-size:24px" id="menuToggle">☰</span>
        <div class="brand-name">PRASHANT TUBE</div>
    </div>
    <input type="text" class="search-box" id="searchInput" placeholder="Search videos...">
    <div class="header-right" style="display:flex; gap:20px; align-items:center">
        <span style="cursor:pointer; font-size:20px" id="uploadBtn">📹</span>
        <span style="cursor:pointer; font-size:20px" id="themeToggle">🌓</span>
        <div id="profileBtn" style="width:35px; height:35px; border-radius:50%; background:linear-gradient(45deg, #ef4444, #3b82f6); cursor:pointer"></div>
    </div>
</header>

<div class="sidebar" id="sidebar">
    <div class="side-item">🏠 Home</div>
    <div class="side-item">🎞️ Shorts</div>
    <div class="side-item">📺 Subs</div>
    <hr style="border:0.5px solid #333; margin:10px 0">
    <div class="side-item">🕒 History</div>
</div>

<main id="main">
    <div class="video-grid" id="videoGrid"></div>
</main>

<div class="modal" id="videoModal">
    <div class="modal-content-wide">
        <div class="video-container">
            <iframe id="player" width="100%" height="100%" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
        <div class="comments-section">
            <h3 id="modalTitle" style="margin-bottom:10px"></h3>
            <div class="comment-input">
                <input type="text" id="commInput" placeholder="Add a public comment...">
                <button class="sub-btn" id="postComm">Post</button>
            </div>
            <div id="commList"></div>
        </div>
    </div>
</div>

<div class="modal" id="uploadModal">
    <div class="upload-card">
        <h3>Upload Video</h3>
        <input type="text" id="upUrl" placeholder="YouTube URL">
        <input type="text" id="upTitle" placeholder="Title">
        <button class="sub-btn" id="doUpload" style="width:100%">Publish</button>
    </div>
</div>

<div class="modal" id="loginModal">
    <div class="login-card">
        <h3>Account Login</h3>
        <input type="text" placeholder="Email">
        <input type="password" placeholder="Password">
        <button class="sub-btn" id="doLogin" style="width:100%">Sign In</button>
    </div>
</div>

<div id="toast">Done!</div>

<script>
    let videos = [
        { id: 'M4OlCspaBjc', title: 'The Ultimate Animation', author: 'Prashant Studios', comments: ["Amazing!"], liked: false },
        { id: 'dQw4w9WgXcQ', title: 'Coding the Future', author: 'Prashant Dev', comments: [], liked: false }
    ];
    let activeVid = null;

    function render() {
        const grid = document.getElementById('videoGrid');
        grid.innerHTML = '';
        videos.forEach((v, i) => {
            grid.innerHTML += `
                <div class="video-card">
                    <div class="thumb-wrapper" onclick="openPlayer(${i})">
                        <img src="https://img.youtube.com/vi/${v.id}/maxresdefault.jpg">
                    </div>
                    <div style="padding:10px">
                        <h4>${v.title}</h4>
                        <p style="color:gray;font-size:12px">${v.author}</p>
                        <div class="action-btns">
                            <button class="sub-btn" onclick="sub(this)">Subscribe</button>
                            <button class="like-btn ${v.liked ? 'liked' : ''}" onclick="toggleLike(${i}, this)">👍</button>
                        </div>
                    </div>
                </div>`;
        });
    }

    function openPlayer(i) {
        activeVid = i;
        document.getElementById('player').src = `https://www.youtube.com/embed/${videos[i].id}?autoplay=1`;
        document.getElementById('modalTitle').innerText = videos[i].title;
        renderComms();
        document.getElementById('videoModal').style.display = 'flex';
    }

    function renderComms() {
        const list = document.getElementById('commList');
        list.innerHTML = videos[activeVid].comments.map(c => `<p style="margin-bottom:10px; font-size:14px"><strong>User:</strong> ${c}</p>`).join('');
    }

    document.getElementById('postComm').onclick = () => {
        const inp = document.getElementById('commInput');
        if(inp.value) { videos[activeVid].comments.unshift(inp.value); inp.value=''; renderComms(); }
    };

    function sub(btn) {
        if(!btn.classList.contains('active')) {
            btn.classList.add('active'); btn.innerText = 'Subscribed';
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
        } else { btn.classList.remove('active'); btn.innerText = 'Subscribe'; }
    }

    function toggleLike(i, btn) {
        videos[i].liked = !videos[i].liked;
        btn.classList.toggle('liked');
        if(videos[i].liked) showToast("Added to Liked Videos");
    }

    // Modal Control
    window.onclick = (e) => { if(e.target.className === 'modal') { e.target.style.display = 'none'; document.getElementById('player').src=''; } };
    document.getElementById('menuToggle').onclick = () => { 
        document.getElementById('sidebar').classList.toggle('collapsed');
        document.getElementById('main').classList.toggle('expanded');
    };

    // Upload / Login / Theme
    document.getElementById('uploadBtn').onclick = () => document.getElementById('uploadModal').style.display = 'flex';
    document.getElementById('doUpload').onclick = () => {
        const url = document.getElementById('upUrl').value;
        const id = url.includes('v=') ? url.split('v=')[1].split('&')[0] : url.split('/').pop();
        videos.unshift({ id, title: document.getElementById('upTitle').value, author: 'Me', comments: [], liked: false });
        render(); document.getElementById('uploadModal').style.display='none';
    };
    document.getElementById('profileBtn').onclick = () => document.getElementById('loginModal').style.display = 'flex';
    document.getElementById('doLogin').onclick = () => { showToast("Signed in!"); document.getElementById('loginModal').style.display='none'; };
    document.getElementById('themeToggle').onclick = () => document.body.classList.toggle('light-theme');

    function showToast(m) { const t = document.getElementById('toast'); t.innerText=m; t.style.display='block'; setTimeout(()=>t.style.display='none',2000); }
    
    // Search
    document.getElementById('searchInput').oninput = (e) => {
        const val = e.target.value.toLowerCase();
        document.querySelectorAll('.video-card').forEach(card => {
            card.style.display = card.querySelector('h4').innerText.toLowerCase().includes(val) ? 'block' : 'none';
        });
    };

    render();
</script>
</body>
</html>
